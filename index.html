<!DOCTYPE html>
<html>
<head>

<title>Emergency Shelter Finder</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<header>
<h1>Emergency Shelter Finder</h1>
<p>Find the nearest safe shelter during disasters</p>
</header>

<div class="controls">

<button onclick="getLocation()">Find My Location</button>

<button onclick="showShelters()">Show Shelters</button>

</div>

<div id="map"></div>

<div class="info">
<h2>Disaster Help Information</h2>

<p>During disasters like floods, earthquakes, or cyclones, people can use this system to locate nearby emergency shelters quickly and safely.</p>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
